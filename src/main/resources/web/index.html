<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboTransfer 局域网极速传输</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 24px; }
        .glass-card { background: var(--card-bg); padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { margin: 0 0 20px 0; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .drop-zone { border: 2px dashed #cbd5e1; padding: 40px 20px; border-radius: 12px; cursor: pointer; background: #f1f5f9; text-align: center; }
        .drop-zone:hover { border-color: var(--primary); background: #eff6ff; }
        input[type="file"] { display: none; }
        .progress-wrapper { margin-top: 20px; display: none; background: #f1f5f9; border-radius: 8px; padding: 12px; }
        .progress-rail { background: #e2e8f0; border-radius: 9999px; height: 8px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #10b981); width: 0%; height: 100%; }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 20px; }

        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 10px; }
        .media-card { background: #f8fafc; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; transition: all 0.2s; }
        .media-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(0,0,0,0.12); }

        .preview-box { width: 100%; height: 140px; background: linear-gradient(180deg, #eff6ff 0%, #e2e8f0 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 12px; box-sizing: border-box; }
        .preview-image { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .preview-image-shell { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        .preview-image-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .preview-box svg { width: 44px; height: 44px; color: #94a3b8; }
        .preview-glyph { width: 100%; height: 100%; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .preview-glyph svg { width: 48px; height: 48px; color: inherit; }
        .preview-glyph-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; }
        .preview-package { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .preview-package-icon { width: 72px; height: 72px; border-radius: 18px; background: rgba(255,255,255,0.88); box-shadow: 0 10px 24px rgba(59,130,246,0.12); display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; }
        .preview-package-icon-image { width: 96px; height: 96px; padding: 0; background: transparent; box-shadow: none; }
        .preview-package-image { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 18px rgba(15,23,42,0.12)); }
        .preview-package-icon svg { width: 36px; height: 36px; color: #64748b; }
        .preview-package-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #2563eb; }
        .is-hidden { display: none !important; }
        .preview-package-tag { padding: 4px 10px; border-radius: 999px; background: rgba(59,130,246,0.12); color: #1d4ed8; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; }
        .accent-blue { color: #2563eb; background: rgba(219,234,254,0.76); }
        .accent-green { color: #047857; background: rgba(209,250,229,0.88); }
        .accent-pink { color: #be185d; background: rgba(252,231,243,0.92); }
        .accent-amber { color: #b45309; background: rgba(254,243,199,0.92); }
        .accent-slate { color: #334155; background: rgba(226,232,240,0.92); }
        .accent-orange { color: #c2410c; background: rgba(255,237,213,0.92); }
        .accent-cyan { color: #0f766e; background: rgba(204,251,241,0.92); }
        .accent-violet { color: #7c3aed; background: rgba(237,233,254,0.92); }
        .accent-red { color: #b91c1c; background: rgba(254,226,226,0.92); }

        .media-info { padding: 12px; display: flex; flex-direction: column; gap: 6px; background: #ffffff; flex-grow: 1; }
        .media-title { font-size: 13px; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .media-size { font-size: 11px; color: var(--text-muted); }
        .media-action { display: block; text-align: center; background: #f1f5f9; color: #334155; text-decoration: none; font-size: 12px; font-weight: 600; padding: 8px; border-radius: 8px; }
        .media-action:hover { background: var(--primary); color: white; }

        @media (min-width: 768px) { body { padding: 40px; } .container { gap: 32px; } .glass-card { padding: 32px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h2>极速文件传输</h2>
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <span id="uploadHint" style="font-weight:600;">点击或拖拽文件到这里</span><br>
            <span style="font-size:12px; color:var(--text-muted);" id="fileSizeInfo">支持跨平台任意大文件、安装包落盘</span>
            <input type="file" id="fileInput" onchange="updateFileInfo()" />
        </div>
        <div class="progress-wrapper" id="progressWrapper">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;"><span id="statusText">准备上传...</span><span id="percentText">0%</span></div>
            <div class="progress-rail"><div class="progress-bar" id="progressBar"></div></div>
        </div>
        <button id="uploadBtn" class="btn-prime" onclick="startUpload()">开始传输</button>
    </div>
    <div class="glass-card">
        <h2>存储仓库多端下载网格</h2>
        <div class="grid-view" id="gridView"></div>
    </div>
    <div class="glass-card">
        <h2>局域网设备列表</h2>
        <div class="grid-view" id="peerGridView"></div>
    </div>
</div>
<script src="/app.js"></script>
<script>
    function updateFileInfo() {
        const file = document.getElementById('fileInput').files[0];
        if (file) {
            document.getElementById('uploadHint').innerText = file.name;
            document.getElementById('fileSizeInfo').innerText = `文件大小: ${(file.size / 1024 / 1024).toFixed(2)} MB`;
        }
    }
</script>
</body>
</html>
